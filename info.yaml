# Tiny Tapeout project information
project:
  title:        "SNN-based Physical Uncloneable Function"      # Project title
  author:       "Aditya Kumar"      # Your name
  discord:      ""      # Your discord username, for communication and automatically assigning you a Tapeout role (optional)
  description:  "A hardware Physical Uncloneable Function consisting of four LIF neurons. Challenge-response auth through spike timing."      # One line description of what your project does
  language:     "SystemVerilog" # other examples include SystemVerilog, Amaranth, VHDL, etc
  clock_hz:     0       # Clock frequency in Hz (or 0 if not applicable)

  # How many tiles your design occupies? A single tile is about 167x108 uM.
  tiles: "1x1"          # Valid values: 1x1, 1x2, 2x2, 3x2, 4x2, 6x2 or 8x2

  # Your top module name must start with "tt_um_". Make it unique by including your github username:
  top_module:  "tt_um_neuro_puf"

  # List your project's source files here.
  # Source files must be in ./src and you must list each source file separately, one per line.
  # Don't forget to also update `PROJECT_SOURCES` in test/Makefile.
  source_files:
    - "project.v"
    - "neuron_lif.v"

# The pinout of your project. Leave unused pins blank. DO NOT delete or add any pins.
# This section is for the datasheet/website. Use descriptive names (e.g., RX, TX, MOSI, SCL, SEG_A, etc.).
pinout:
  # Inputs
  ui[0]:  "challenge[0]"
  ui[1]:  "challenge[1]"
  ui[2]:  "challenge[2]"
  ui[3]:  "challenge[3]"
  ui[4]:  "challenge[4]"
  ui[5]:  "challenge[5]"
  ui[6]:  "challenge[6]"
  ui[7]:  "challenge[7]"

  # Outputs
  uo[0]:  "spike_map[0] (neuron 0)"
  uo[1]:  "spike_map[1] (neuron 1)"
  uo[2]:  "spike_map[2] (neuron 2)"
  uo[3]:  "spike_map[3] (neuron 3)"
  uo[4]:  "first_time[0]"
  uo[5]:  "first_time[1]"
  uo[6]:  "first_time[2]"
  uo[7]:  "first_time[3]"

  # Bidirectional pins
  uio[0]: "start (input)"
  uio[1]: "trim[0] (input)"
  uio[2]: "trim[1] (input)"
  uio[3]: "trim[2] (input)"
  uio[4]: "trim[3] (input)"
  uio[5]: "unused"
  uio[6]: "unused"
  uio[7]: "unused"

# Do not change!
yaml_version: 6
